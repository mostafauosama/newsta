<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مواد القرطاسية - الواقع المعزز</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .card-description {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .card-price {
            font-size: 1.3rem;
            color: #667eea;
            font-weight: bold;
        }

        .select-btn {
            display: inline-block;
            margin-top: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.3s;
        }

        .select-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .grid { gap: 15px; padding: 10px; }
            .card-image { height: 150px; font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 مواد القرطاسية</h1>
        <div class="subtitle">اختر المنتج الذي تريد رؤيته بالواقع المعزز في غرفتك</div>
        
        <div class="grid" id="productsGrid">
            <!-- المنتجات سيتم إضافتها هنا بواسطة JavaScript -->
        </div>
    </div>

    <script>
        // قائمة المنتجات
        const products = [
            {
                id: 1,
                name: "🪑 كرسي مكتبي فاخر",
                description: "كرسي مريح للدراسة والعمل، بتصميم عصري",
                price: "299 ريال",
                icon: "🪑",
                color: "#8B5A2B",
                modelType: "chair"
            },
            {
                id: 2,
                name: "📖 مكتب خشبي",
                description: "مكتب دراسة أنيق مصنوع من الخشب الطبيعي",
                price: "499 ريال",
                icon: "📖",
                color: "#6B4226",
                modelType: "desk"
            },
            {
                id: 3,
                name: "💡 مصباح قراءة",
                description: "مصباح LED قابل للتعديل، مثالي للقراءة",
                price: "89 ريال",
                icon: "💡",
                color: "#FFD700",
                modelType: "lamp"
            },
            {
                id: 4,
                name: "📚 رف كتب",
                description: "رف كتب خشبي بتصميم مميز يتسع للعديد من الكتب",
                price: "199 ريال",
                icon: "📚",
                color: "#8B6914",
                modelType: "bookshelf"
            },
            {
                id: 5,
                name: "✏️ قلم حبر فاخر",
                description: "قلم حبر أنيق بخط عريض، مثالي للمناسبات",
                price: "49 ريال",
                icon: "✏️",
                color: "#2C2C2C",
                modelType: "pen"
            },
            {
                id: 6,
                name: "📓 دفتر ملاحظات",
                description: "دفتر بتصميم جلد فاخر، أوراق عالية الجودة",
                price: "39 ريال",
                icon: "📓",
                color: "#8B0000",
                modelType: "notebook"
            },
            {
                id: 7,
                name: "🖥️ حامل شاشة",
                description: "حامل شاشة قابل للتعديل لتحسين وضعية الجلوس",
                price: "159 ريال",
                icon: "🖥️",
                color: "#4A4A4A",
                modelType: "stand"
            },
            {
                id: 8,
                name: "🗄️ خزانة ملفات",
                description: "خزانة صغيرة لحفظ المستندات والأوراق المهمة",
                price: "349 ريال",
                icon: "🗄️",
                color: "#A0522D",
                modelType: "cabinet"
            }
        ];

        // عرض المنتجات في الشبكة
        const productsGrid = document.getElementById('productsGrid');
        
        products.forEach(product => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-image" style="background: linear-gradient(135deg, ${product.color}20, ${product.color}40)">
                    <div style="font-size: 5rem;">${product.icon}</div>
                </div>
                <div class="card-content">
                    <div class="card-title">${product.name}</div>
                    <div class="card-description">${product.description}</div>
                    <div class="card-price">${product.price}</div>
                    <button class="select-btn" data-id="${product.id}">🔍 عرض بالواقع المعزز</button>
                </div>
            `;
            
            const btn = card.querySelector('.select-btn');
            btn.addEventListener('click', () => {
                // حفظ المنتج المختار في localStorage
                localStorage.setItem('selectedProduct', JSON.stringify(product));
                // الانتقال إلى صفحة الواقع المعزز
                window.location.href = 'ar-viewer.html';
            });
            
            productsGrid.appendChild(card);
        });
    </script>
</body>
</html>
