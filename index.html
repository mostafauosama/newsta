<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مواد القرطاسية - الواقع المعزز</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .add-product-form {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input, .form-group select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input[type="file"] {
            padding: 8px;
            border: 2px dashed #e0e0e0;
            background: #f9f9f9;
            cursor: pointer;
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-top: 10px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f0f0f0;
        }

        .image-preview-removed-bg {
            width: 100px;
            height: 100px;
            border: 2px solid #4caf50;
            border-radius: 10px;
            margin-top: 10px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #333;
        }

        .badge {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 5px;
        }

        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            background-color: #f8f9fa;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }

        .card-sku {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
            font-family: monospace;
        }

        .card-unit {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .transparent-badge {
            display: inline-block;
            background: #2196F3;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            margin-top: 8px;
        }

        .select-btn {
            display: inline-block;
            margin-top: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            font-family: inherit;
        }

        .delete-btn {
            background: linear-gradient(135deg, #f56565 0%, #c53030 100%);
            margin-top: 5px;
        }

        .select-btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .grid { gap: 15px; padding: 10px; }
            .card-image { height: 150px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 نظام إدارة مواد القرطاسية</h1>
        <div class="subtitle">أضف منتجاً وسيتم إزالة الخلفية البيضاء تلقائياً</div>
        
        <div class="add-product-form">
            <div class="form-title">➕ إضافة منتج جديد</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>📷 صورة المنتج (سيتم إزالة الخلفية البيضاء)</label>
                    <input type="file" id="productImage" accept="image/*" onchange="processImage(event)">
                    <div id="imagePreview" class="image-preview"></div>
                    <span id="bgStatus" class="badge" style="display:none; background:#4caf50;">✓ تم إزالة الخلفية</span>
                </div>
                <div class="form-group">
                    <label>🏷️ اسم المنتج</label>
                    <input type="text" id="productName" placeholder="مثال: قلم حبر فاخر">
                </div>
                <div class="form-group">
                    <label>🔢 رقم الأوريكال (SKU)</label>
                    <input type="text" id="productSku" placeholder="مثال: PEN-2024-001">
                </div>
                <div class="form-group">
                    <label>📏 وحدة القياس</label>
                    <select id="productUnit">
                        <option value="قطعة">قطعة</option>
                        <option value="علبة">علبة</option>
                        <option value="حزمة">حزمة</option>
                        <option value="كيلو">كيلو</option>
                        <option value="متر">متر</option>
                        <option value="لتر">لتر</option>
                        <option value="طقم">طقم</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📝 وصف المنتج</label>
                    <input type="text" id="productDesc" placeholder="وصف قصير للمنتج">
                </div>
            </div>
            <button class="btn-add" onclick="addProduct()">➕ إضافة المنتج</button>
        </div>
        
        <div class="grid" id="productsGrid"></div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('products')) || [];
        let processedImageData = null;

        // دالة إزالة الخلفية البيضاء من الصورة
        function removeWhiteBackground(imageData, threshold = 240) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0, img.width, img.height);
                    
                    const imageDataObj = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageDataObj.data;
                    
                    // تحويل الخلفية البيضاء إلى شفافة
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        
                        // إذا كان اللون قريباً من الأبيض
                        if (r > threshold && g > threshold && b > threshold) {
                            data[i + 3] = 0; // جعل透明度 0 (شفاف)
                        }
                    }
                    
                    ctx.putImageData(imageDataObj, 0, 0);
                    
                    // حساب الحدود لإزالة المساحات البيضاء الإضافية
                    const trimmedCanvas = trimCanvas(canvas);
                    resolve(trimmedCanvas.toDataURL('image/png'));
                };
                img.src = imageData;
            });
        }

        // دالة قص الصورة لإزالة المساحات الفارغة حول المنتج
        function trimCanvas(canvas) {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const imageData = ctx.getImageData(0, 0, width, height);
            const data = imageData.data;
            
            let top = height, bottom = 0, left = width, right = 0;
            
            // البحث عن أول بكسل غير شفاف
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const alpha = data[(y * width + x) * 4 + 3];
                    if (alpha > 0) {
                        if (x < left) left = x;
                        if (x > right) right = x;
                        if (y < top) top = y;
                        if (y > bottom) bottom = y;
                    }
                }
            }
            
            // إضافة هامش صغير حول المنتج
            const margin = 10;
            left = Math.max(0, left - margin);
            top = Math.max(0, top - margin);
            right = Math.min(width, right + margin);
            bottom = Math.min(height, bottom + margin);
            
            const trimmedWidth = right - left;
            const trimmedHeight = bottom - top;
            
            if (trimmedWidth > 0 && trimmedHeight > 0) {
                const trimmedCanvas = document.createElement('canvas');
                trimmedCanvas.width = trimmedWidth;
                trimmedCanvas.height = trimmedHeight;
                const trimmedCtx = trimmedCanvas.getContext('2d');
                trimmedCtx.drawImage(canvas, left, top, trimmedWidth, trimmedHeight, 0, 0, trimmedWidth, trimmedHeight);
                return trimmedCanvas;
            }
            
            return canvas;
        }

        // معاينة الصورة ومعالجة الخلفية
        window.processImage = async function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const originalImage = e.target.result;
                    
                    // عرض الصورة الأصلية
                    document.getElementById('imagePreview').style.backgroundImage = `url(${originalImage})`;
                    document.getElementById('imagePreview').style.backgroundSize = 'contain';
                    document.getElementById('imagePreview').style.backgroundColor = '#f0f0f0';
                    
                    // إظهار حالة المعالجة
                    const statusSpan = document.getElementById('bgStatus');
                    statusSpan.style.display = 'inline-block';
                    statusSpan.textContent = '⏳ جاري إزالة الخلفية...';
                    statusSpan.style.background = '#ff9800';
                    
                    // إزالة الخلفية البيضاء
                    processedImageData = await removeWhiteBackground(originalImage, 240);
                    
                    // عرض النتيجة
                    document.getElementById('imagePreview').style.backgroundImage = `url(${processedImageData})`;
                    document.getElementById('imagePreview').style.backgroundColor = '#333';
                    
                    statusSpan.textContent = '✓ تم إزالة الخلفية بنجاح';
                    statusSpan.style.background = '#4caf50';
                };
                reader.readAsDataURL(file);
            }
        };

        window.addProduct = function() {
            const name = document.getElementById('productName').value;
            const sku = document.getElementById('productSku').value;
            const unit = document.getElementById('productUnit').value;
            const desc = document.getElementById('productDesc').value;

            if (!name || !sku) {
                alert('الرجاء إدخال اسم المنتج ورقم الأوريكال');
                return;
            }

            if (!processedImageData) {
                alert('الرجاء رفع صورة للمنتج');
                return;
            }

            const newProduct = {
                id: Date.now(),
                name: name,
                sku: sku,
                unit: unit,
                description: desc || 'لا يوجد وصف',
                imageData: processedImageData, // الصورة بعد إزالة الخلفية
                originalImage: null,
                createdAt: new Date().toLocaleDateString('ar-EG')
            };
            
            products.push(newProduct);
            saveProducts();
            renderProducts();
            clearForm();
        };

        function clearForm() {
            document.getElementById('productName').value = '';
            document.getElementById('productSku').value = '';
            document.getElementById('productDesc').value = '';
            document.getElementById('productImage').value = '';
            document.getElementById('imagePreview').style.backgroundImage = '';
            document.getElementById('imagePreview').style.backgroundColor = '#f0f0f0';
            document.getElementById('bgStatus').style.display = 'none';
            processedImageData = null;
            document.getElementById('productUnit').value = 'قطعة';
        }

        function saveProducts() {
            localStorage.setItem('products', JSON.stringify(products));
        }

        window.deleteProduct = function(id) {
            if (confirm('هل أنت متأكد من حذف هذا المنتج؟')) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                renderProducts();
            }
        };

        window.selectProduct = function(product) {
            localStorage.setItem('selectedProduct', JSON.stringify(product));
            window.location.href = 'ar-viewer.html';
        };

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            
            if (products.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 50px; background: white; border-radius: 20px;">
                        <div style="font-size: 3rem;">📦</div>
                        <p style="margin-top: 10px; color: #666;">لا توجد منتجات. أضف منتجاً جديداً باستخدام النموذج أعلاه.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = products.map(product => `
                <div class="card">
                    <div class="card-image" style="background-image: url(${product.imageData}); background-size: contain; background-color: #f0f0f0;">
                    </div>
                    <div class="card-content">
                        <div class="card-title">${product.name}</div>
                        <div class="card-sku">🔢 رقم الأوريكال: ${product.sku}</div>
                        <div class="card-unit">📏 وحدة القياس: ${product.unit}</div>
                        <div class="card-description" style="color:#666; font-size:0.9rem; margin-bottom:15px;">📝 ${product.description}</div>
                        <span class="transparent-badge">✨ خلفية شفافة</span>
                        <button class="select-btn" onclick='selectProduct(${JSON.stringify(product)})'>🔍 عرض بالواقع المعزز</button>
                        <button class="select-btn delete-btn" onclick="deleteProduct(${product.id})">🗑️ حذف المنتج</button>
                    </div>
                </div>
            `).join('');
        }

        renderProducts();
    </script>
</body>
</html>
